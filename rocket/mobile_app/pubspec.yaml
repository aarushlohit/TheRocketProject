name: nova_mobile
description: Stage 0 mobile client for Nova draw-to-action control.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  mobile_scanner: ^6.0.2
  shared_preferences: ^2.3.2
  # TTS for voice feedback
  flutter_tts: ^4.2.0
  # Vibration for haptic feedback
  vibration: ^2.0.0
  # Provider for state management
  provider: ^6.1.2
  # HTTP client for /process and /confirm API calls
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
