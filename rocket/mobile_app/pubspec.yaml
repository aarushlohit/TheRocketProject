name: rocket
description: Rocket mobile client for voice, drawing, and braille input.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  mobile_scanner: ^6.0.2
  shared_preferences: ^2.3.2
  # TTS for voice feedback
  flutter_tts: ^4.2.0
  # Vibration for haptic feedback
  vibration: ^2.0.0
  record: ^7.1.0
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
