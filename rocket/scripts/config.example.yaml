# Example Rocket Agent Configuration
# Copy this to ~/.rocket/config.yaml and customize

agent:
  # WebSocket server settings
  host: localhost
  port: 8765
  log_level: INFO  # DEBUG, INFO, WARNING, ERROR

platform:
  # Platform detection: auto, windows, macos, linux
  type: auto

skills:
  # Enabled skills (Phase 0 MVP)
  enabled:
    - OPEN_APP          # Open applications
    - TYPE_TEXT         # Type into focused window
    - PRESS_KEYS        # Keyboard shortcuts
    - SCROLL            # Scrolling
    - CLICK             # Click at coordinates
    - OPEN_URL          # Open URLs in browser
    - SELECT_TEXT       # Select text

  # Disabled skills (safe mode)
  disabled:
    # - DELETE_FILES  # Very dangerous, keep disabled

nlu:
  # Intent parsing settings
  confidence_threshold: 0.7    # Minimum confidence to execute
  ask_on_ambiguous: true       # Ask user to clarify if ambiguous

models:
  # Whisper model size: tiny, base, small, medium, large
  whisper_model: base
  
  # Device to use: cuda (GPU), cpu, mps (macOS GPU), auto
  device: auto
  
  # Model caching directory
  cache_dir: ~/.rocket/models

# Advanced settings (optional)
accessibility:
  sound_feedback: true         # Audio feedback for actions
  haptic_feedback: true        # Vibration feedback (mobile)
  verbose_errors: true         # Detailed error messages
  logging_to_file: true        # Log to file in addition to console

privacy:
  keep_logs: true              # Keep action logs locally
  send_telemetry: false        # Don't send usage data
  offline_mode: true           # Prefer local models

performance:
  max_command_queue: 50        # Max queued commands
  command_timeout: 10          # Seconds before timeout
  latency_target_ms: 800       # Target end-to-end latency
