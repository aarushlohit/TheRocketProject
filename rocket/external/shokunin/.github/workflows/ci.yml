name: CI
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate SKILL.md frontmatter
        shell: bash
        run: |
          errors=0
          warnings=0
          for dir in .pack/skills/*/; do
            f="${dir}SKILL.md"
            [ -f "$f" ] || continue
            n=$(basename "$dir")
            grep -q "^name:" "$f" || { echo "ERROR: MISSING name: $n"; errors=$((errors+1)); }
            grep -q "^description:" "$f" || { echo "WARN: MISSING description: $n"; warnings=$((warnings+1)); }
            grep -qi "workflow\|## Workflow\|## Procedural\|## The Structure\|## Usage\|trigger\|sub-command" "$f" || { echo "WARN: MISSING workflow: $n"; warnings=$((warnings+1)); }
          done
          echo "Skills validated: $errors errors, $warnings warnings"
          if [ "$errors" -gt 0 ]; then exit 1; fi
          echo "All skills OK"

      - name: Validate JSON config
        shell: bash
        run: |
          python3 -c "import json; json.load(open('.pack/opencode.json')); print('Config valid')"

      - name: Validate bash scripts
        shell: bash
        run: |
          for s in .pack/scripts/linux/*.sh install.sh; do
            [ -f "$s" ] && bash -n "$s" || echo "SYNTAX ERROR: $s"
          done
          echo "All scripts OK"

      - name: Validate CLAUDE.md template
        shell: bash
        run: |
          grep -q "{{USERNAME}}" .pack/CLAUDE.md.template && echo "Template HAS USERNAME"
          grep -q "MEMORY SYSTEM" .pack/CLAUDE.md.template && echo "Template HAS MEMORY SYSTEM"
          echo "Template OK"

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install mypy chromadb
      - name: Type check Python
        run: mypy .pack/scripts/chroma-helper.py .pack/memory/mcp-server.py

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install bandit
      - name: Security scan
        run: bandit -r .pack/scripts/ .pack/memory/ -f json || true