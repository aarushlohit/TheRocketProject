name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: |
          PREVIOUS_TAG=$(git tag --list 'v*' | sort -V | tail -2 | head -1)
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "RELEASE_NOTES=Initial release" >> $GITHUB_ENV
          else
            NOTES=$(git log "$PREVIOUS_TAG"..HEAD --oneline --pretty=format:"- %s")
            echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
            echo "$NOTES" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Build release archive
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p "shokunin-$VERSION"
          cp -r .pack "shokunin-$VERSION/"
          cp install.ps1 install.sh "shokunin-$VERSION/"
          tar -czf "shokunin-$VERSION.tar.gz" "shokunin-$VERSION/"
          echo "ARCHIVE=shokunin-$VERSION.tar.gz" >> $GITHUB_ENV
          echo "Skills: $(ls -d */ | wc -l)" >> release-summary.txt
          echo "Scripts: $(ls .pack/scripts/*.ps1 .pack/scripts/*.sh .pack/scripts/*.py .pack/scripts/linux/*.sh 2>/dev/null | wc -l)" >> release-summary.txt
          echo "Templates: $(ls .pack/templates/* 2>/dev/null | wc -l)" >> release-summary.txt
          echo "Rules: $(ls .pack/rules/* 2>/dev/null | wc -l)" >> release-summary.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Shokunin ${{ github.ref_name }}
          body: ${{ env.RELEASE_NOTES }}
          files: |
            ${{ env.ARCHIVE }}
