apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app: app
    env: prod
    team: platform
    managed-by: kustomize
spec:
  replicas: 3
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  minReadySeconds: 15
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
        version: stable
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
        sidecar.istio.io/inject: "true"
        linkerd.io/inject: enabled
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      imagePullSecrets:
        - name: registry-credentials
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: app
      enableServiceLinks: false

      # ── Topology Spread ─────────────────────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: app
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: app

      # ── Node & Pod Affinity ────────────────────────────────────
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-type
                    operator: In
                    values:
                      - general
                      - spot-allowed
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: app
                topologyKey: kubernetes.io/hostname

      # ── Init Container ─────────────────────────────────────────
      initContainers:
        - name: init-wait
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Waiting for dependencies..."
              until nslookup db-svc; do
                echo "db not ready yet..."
                sleep 2
              done
              echo "db is ready"
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true

      # ── Main Container ─────────────────────────────────────────
      containers:
        - name: app
          image: myregistry.com/app:1.0.0
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
            - containerPort: 9090
              protocol: TCP
              name: metrics

          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets

          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: url
                  optional: false
            - name: LOG_LEVEL
              value: "info"

          # ── Resource Requests & Limits ──────────────────────
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"

          # ── Probes ──────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 2

          startupProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 30

          # ── Security Context ───────────────────────────────
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            privileged: false

          # ── Container Lifecycle ────────────────────────────
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - sleep 15 && kill -TERM 1

          # ── Volume Mounts ──────────────────────────────────
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-data
              mountPath: /data
              readOnly: false
            - name: tls-certs
              mountPath: /etc/ssl/certs
              readOnly: true

      # ── Volumes ───────────────────────────────────────────────
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: "100Mi"
        - name: app-data
          emptyDir:
            sizeLimit: "1Gi"
        - name: tls-certs
          secret:
            secretName: app-tls
            optional: true
            defaultMode: 0444

      # ── Scheduling ────────────────────────────────────────────
      schedulerName: default-scheduler
      priorityClassName: high-priority

      # ── DNS & Hosts ───────────────────────────────────────────
      dnsPolicy: ClusterFirst
      dnsConfig:
        options:
          - name: ndots
            value: "3"
          - name: single-request-reopen

      # ── Tolerations ───────────────────────────────────────────
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 300
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 300
        - effect: NoSchedule
          key: dedicated
          operator: Equal
          value: general
---
apiVersion: v1
kind: Service
metadata:
  name: app
  labels:
    app: app
    env: prod
spec:
  type: ClusterIP
  selector:
    app: app
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app-hpa
  labels:
    app: app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: app-pdb
  labels:
    app: app
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: app
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  labels:
    app: app
data:
  LOG_LEVEL: "info"
  METRICS_ENABLED: "true"
  CACHE_TTL: "300"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app
  labels:
    app: app
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/app-role
automountServiceAccountToken: false
