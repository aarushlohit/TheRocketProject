# =============================================================================
# docker-compose.yml — Production-grade template
# Usage:
#   docker compose up -d                    # Start all services
#   docker compose watch                    # Hot-reload (develop mode)
#   docker compose run --rm app npm test    # Run one-off commands
# =============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck: &default-healthcheck
  interval: 30s
  timeout: 3s
  start_period: 5s
  retries: 3

x-deploy: &default-deploy
  resources:
    limits:
      cpus: "1"
      memory: 512M
    reservations:
      cpus: "0.25"
      memory: 128M

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        - NODE_ENV=${NODE_ENV:-production}
    image: ${IMAGE_NAME:-myapp}:${IMAGE_TAG:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-myapp}-app
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgres://${DB_USER:-app}:${DB_PASS:-changeme}@db:5432/${DB_NAME:-app}
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=${LOG_LEVEL:-info}
    env_file:
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
    logging: *default-logging
    deploy:
      <<: *default-deploy
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - node_modules/
            - "*.test.ts"
            - "*.spec.ts"
        - action: sync
          path: ./prisma
          target: /app/prisma
        - action: rebuild
          path: package.json
        - action: rebuild
          path: Dockerfile

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        - NODE_ENV=${NODE_ENV:-production}
    image: ${IMAGE_NAME:-myapp}:${IMAGE_TAG:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-myapp}-worker
    command: ["node", "dist/worker.js"]
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgres://${DB_USER:-app}:${DB_PASS:-changeme}@db:5432/${DB_NAME:-app}
      - REDIS_URL=redis://redis:6379
    env_file:
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      start_period: 10s
    logging: *default-logging
    deploy:
      <<: *default-deploy
    restart: unless-stopped
    stop_grace_period: 60s
    security_opt:
      - no-new-privileges:true
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: rebuild
          path: package.json

  db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-myapp}-db
    shm_size: 256mb
    environment:
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
      POSTGRES_DB: ${DB_NAME:-app}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app} -d ${DB_NAME:-app}"]
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-myapp}-redis
    command:
      - redis-server
      - --appendonly yes
      - --maxmemory 256mb
      - --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "redis-cli", "ping"]
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:-myapp}-network
    driver: bridge
